name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Restore better-sqlite3 mock
        run: |
          mkdir -p node_modules/better-sqlite3
          cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
          echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json

      - name: TypeScript check
        run: node_modules/.bin/tsc -p tsconfig.app.json --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: node_modules/.bin/vite build