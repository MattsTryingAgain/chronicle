name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Restore better-sqlite3 mock
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path node_modules/better-sqlite3
          Copy-Item src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
          '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' | Out-File -Encoding utf8 node_modules/better-sqlite3/package.json

      - name: Sync version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Run tests
        run: npm test

      - name: Build Vite app
        run: node_modules/.bin/vite build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List release output
        shell: pwsh
        run: Get-ChildItem release -Recurse | Select-Object FullName

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest.yml
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Restore better-sqlite3 mock
        run: |
          mkdir -p node_modules/better-sqlite3
          cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
          echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json

      - name: Sync version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: Run tests
        run: npm test

      - name: Build Vite app
        run: node_modules/.bin/vite build

      - name: Build Mac installer
        run: npx electron-builder --mac --publish never

      - name: List release output
        run: find release -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.blockmap
            release/**/latest-mac.yml
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Restore better-sqlite3 mock
        run: |
          mkdir -p node_modules/better-sqlite3
          cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
          echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json

      - name: Sync version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: Run tests
        run: npm test

      - name: Build Vite app
        run: node_modules/.bin/vite build

      - name: Build Linux installer
        run: npx electron-builder --linux --publish never

      - name: List release output
        run: find release -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.blockmap
            release/**/latest-linux.yml
          if-no-files-found: warn

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Flatten artifacts into single directory
        run: |
          mkdir -p release-assets
          # Copy only installer-level files — exclude win-unpacked/ contents
          # Setup exe, blockmap, and yml files from the root of each platform build
          find artifacts -type f \( -name "*-Setup-*.exe" -o -name "*-Setup-*.dmg" -o -name "*-Setup-*.zip" -o -name "*-Setup-*.AppImage" -o -name "*-Setup-*.deb" -o -name "*.exe.blockmap" -o -name "*.dmg.blockmap" -o -name "*.zip.blockmap" -o -name "*.AppImage.blockmap" -o -name "latest*.yml" \) -exec cp {} release-assets/ \;
          echo "--- Release assets ---"
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
