# Chronicle — Release Workflow
#
# Triggered when you push a version tag (e.g. v1.0.0).
# Builds installers on real Mac, Windows, and Linux machines in parallel,
# then attaches them all to a GitHub Release automatically.
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# That's it. GitHub does the rest. The release appears at:
#   https://github.com/YOUR_USERNAME/chronicle/releases
#
# REQUIRED SECRETS (set in GitHub → Settings → Secrets → Actions):
#   None required for basic unsigned builds.
#   For code-signed builds (removes OS security warnings), see the
#   "Code signing" section at the bottom of this file.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: mkdir -p node_modules/better-sqlite3
      - run: cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
      - run: echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-windows:
    name: Build — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: mkdir -p node_modules/better-sqlite3
        shell: bash
      - run: cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
        shell: bash
      - run: echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json
        shell: bash
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/*.exe
          if-no-files-found: error

  build-linux:
    name: Build — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: mkdir -p node_modules/better-sqlite3
      - run: cp src/__mocks__/better-sqlite3.js node_modules/better-sqlite3/index.js
      - run: echo '{"name":"better-sqlite3","version":"9.0.0","main":"index.js"}' > node_modules/better-sqlite3/package.json
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: Chronicle ${{ github.ref_name }}
          generate_release_notes: true
          files: installers/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# You can distribute without signing initially — family members can get past
# the warnings. Add signing before any wider public release.
